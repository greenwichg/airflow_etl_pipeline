version: 2

models:
  - name: stg_sales_transactions
    description: >
      Cleaned and deduplicated sales transactions from the staging table.
      Filters out delete markers (handled separately in the incremental merge)
      and applies type casting, null defaults, and column renaming.
    columns:
      - name: sale_id
        description: Unique transaction identifier
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: sale_date
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: unit_price
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.01
      - name: total_amount
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.01
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['US-EAST', 'US-WEST', 'EUROPE', 'ASIA-PACIFIC']
      - name: is_deleted
        description: CDC delete marker flag
        tests:
          - not_null

  - name: stg_cdc_delete_markers
    description: >
      Sale IDs marked for deletion via CDC soft-delete. Used by
      the incremental mart model to remove rows from the fact table.
    columns:
      - name: sale_id
        description: Transaction to delete from the target
        tests:
          - not_null
